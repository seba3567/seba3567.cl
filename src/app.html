<!doctype html>
<html lang="es" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta
			name="description"
			content="Portafolio de proyectos de Sebastián Muñoz — Svelte, Android (AntiCallCL), Python, TypeScript. Glassmorphism sobre Svelte 5 + Tailwind v4."
		/>
		<meta property="og:title" content="seba3567.cl · Sebastián Muñoz" />
		<meta
			property="og:description"
			content="AntiCallCL, autoskills, frontend.skeleton y más. Repos curados desde GitHub."
		/>
		<meta property="og:type" content="website" />
		%sveltekit.head%
	</head>
	<style>
		@view-transition {
			navigation: auto;
		}
		::view-transition-old(root),
		::view-transition-new(root) {
			animation-duration: 280ms;
			animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
		}
		::view-transition-old(root) {
			animation-name: vt-out;
		}
		::view-transition-new(root) {
			animation-name: vt-in;
		}
		@keyframes vt-out {
			to {
				opacity: 0;
				transform: translateY(-6px);
			}
		}
		@keyframes vt-in {
			from {
				opacity: 0;
				transform: translateY(6px);
			}
		}
		@media (prefers-reduced-motion: reduce) {
			::view-transition-old(root),
			::view-transition-new(root) {
				animation: none;
			}
		}
	</style>
	<body data-sveltekit-preload-data="hover" class="bg-neutral-950 text-neutral-100 antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
